---
# PKI Host Setup - Main tasks

- name: Validate supported OS
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
      - ansible_distribution_version in ["22.04", "24.04"]
    fail_msg: "This role only supports Ubuntu 22.04 and 24.04. Detected: {{ ansible_distribution }} {{ ansible_distribution_version }}"
    success_msg: "Running on supported OS: Ubuntu {{ ansible_distribution_version }}"

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - pki_api_url | length > 0
      - pki_oidc_url | length > 0
      - pki_client_id | length > 0
      - pki_client_secret | length > 0
      - pki_ca_id | length > 0
      - pki_cert_org | length > 0
      - pki_cert_country | length == 2
    fail_msg: "Missing required PKI configuration variables (api_url, oidc_url, client_id, client_secret, ca_id, cert_org, cert_country)"

- name: Ensure ssl-cert group exists
  ansible.builtin.group:
    name: ssl-cert
    state: present
    system: true

- name: Ensure certificate directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ pki_cert_dir }}", group: "root", mode: "0755" }
    - { path: "{{ pki_key_dir }}", group: "ssl-cert", mode: "0710" }
    - { path: "{{ pki_ca_trust_dir }}", group: "root", mode: "0755" }

- name: Get CA certificate
  oriolrius.pki_manager.pki_manager:
    action: ca_get
    api_url: "{{ pki_api_url }}"
    oidc_url: "{{ pki_oidc_url }}"
    client_id: "{{ pki_client_id }}"
    client_secret: "{{ pki_client_secret }}"
    validate_certs: "{{ pki_validate_certs }}"
    ca_id: "{{ pki_ca_id }}"
  register: _pki_ca_info

- name: Install CA certificate in trust store
  when: pki_install_ca_trust
  block:
    - name: Write CA certificate to trust store
      ansible.builtin.copy:
        content: "{{ _pki_ca_info.ca.certificatePem }}"
        dest: "{{ pki_ca_trust_dir }}/pki-ca-{{ pki_ca_id | regex_replace('[^a-zA-Z0-9]', '-') }}.crt"
        owner: root
        group: root
        mode: "0644"
      register: _pki_ca_installed

    - name: Update CA certificates
      ansible.builtin.command: update-ca-certificates
      when: _pki_ca_installed.changed
      changed_when: true

- name: Process each certificate
  ansible.builtin.include_tasks: issue_cert.yml
  loop: "{{ pki_certificates }}"
  loop_control:
    loop_var: cert_config
    label: "{{ cert_config.name | default(ansible_hostname) }}"
