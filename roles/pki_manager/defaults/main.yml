---
# PKI Manager API Configuration
# Required: Set these in your playbook or inventory
pki_api_url: ""
pki_oidc_url: ""
pki_client_id: ""
pki_client_secret: ""

# Token cache settings
pki_token_cache_file: "/tmp/.pki_manager_token"
pki_token_refresh_margin: 60  # Refresh token if less than 60 seconds remaining

# Default certificate settings
pki_cert_validity_days: 365
pki_cert_algorithm: "RSA-2048"
pki_cert_type: "server"

# Default CA settings
pki_ca_validity_days: 3650
pki_ca_algorithm: "RSA-4096"

# API timeout settings
pki_api_timeout: 30
pki_api_retries: 3
pki_api_retry_delay: 5

# Output directory for downloaded certificates
pki_output_dir: "/etc/pki/certs"

# Whether to validate SSL certificates when connecting to PKI Manager
pki_validate_certs: true
