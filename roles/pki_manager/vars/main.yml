---
# Internal variables - do not override

# Valid certificate types
_pki_valid_cert_types:
  - server
  - client
  - email
  - code_signing

# Valid key algorithms
_pki_valid_algorithms:
  - RSA-2048
  - RSA-4096
  - ECDSA-P256
  - ECDSA-P384

# Valid revocation reasons
_pki_valid_revocation_reasons:
  - unspecified
  - keyCompromise
  - caCompromise
  - affiliationChanged
  - superseded
  - cessationOfOperation
  - certificateHold
  - removeFromCRL
  - privilegeWithdrawn
  - aaCompromise

# Valid certificate statuses
_pki_valid_statuses:
  - active
  - revoked
  - expired

# Download format mappings (API format values)
_pki_download_formats:
  pem: "pem"
  der: "der"
  chain-pem: "chain-pem"
  full-pem: "full-pem"
  full-der: "full-der"
  key-pem: "key-pem"
  key-der: "key-der"
  csr-pem: "csr-pem"
  p12: "p12"
  pfx: "pfx"
  pkcs8-pem: "pkcs8-pem"
  pkcs8-der: "pkcs8-der"
  pkcs8-encrypted: "pkcs8-encrypted"
  jks-keystore: "jks-keystore"
  jks-truststore: "jks-truststore"
