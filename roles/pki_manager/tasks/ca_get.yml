---
# Get Certificate Authority details

- name: Validate CA ID is provided
  ansible.builtin.assert:
    that:
      - pki_ca_id is defined
      - pki_ca_id | length > 0
    fail_msg: "pki_ca_id is required for ca_get action"
    quiet: true

- name: Get Certificate Authority details
  ansible.builtin.uri:
    url: "{{ pki_api_url }}/cas/{{ pki_ca_id }}"
    method: GET
    headers: "{{ _pki_auth_headers }}"
    timeout: "{{ pki_api_timeout }}"
    validate_certs: "{{ pki_validate_certs }}"
  register: pki_ca_get_result

- name: Set CA details fact
  ansible.builtin.set_fact:
    pki_ca: "{{ pki_ca_get_result.json }}"

- name: Display CA details
  ansible.builtin.debug:
    var: pki_ca
  when: not (pki_quiet | default(false))
