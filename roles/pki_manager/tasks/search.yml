---
# Search CAs and certificates

- name: Validate search parameters
  ansible.builtin.assert:
    that:
      - pki_search_query is defined
      - pki_search_query | length > 0
    fail_msg: "pki_search_query is required for search action"
    quiet: true

- name: Build search URL with query and limit
  ansible.builtin.set_fact:
    _pki_search_url: "{{ pki_api_url }}/search?query={{ pki_search_query | urlencode }}&limit={{ pki_search_limit | default(10) }}"

- name: Search CAs and certificates
  ansible.builtin.uri:
    url: "{{ _pki_search_url }}"
    method: GET
    headers: "{{ _pki_auth_headers }}"
    timeout: "{{ pki_api_timeout }}"
    validate_certs: "{{ pki_validate_certs }}"
  register: pki_search_result

- name: Set search results fact
  ansible.builtin.set_fact:
    pki_search_results: "{{ pki_search_result.json.results | default({}) }}"
    pki_search_cas: "{{ pki_search_result.json.results.cas | default([]) }}"
    pki_search_certificates: "{{ pki_search_result.json.results.certificates | default([]) }}"
    pki_search_domains: "{{ pki_search_result.json.results.domains | default([]) }}"
    pki_search_count: "{{ pki_search_result.json.totalCount | default(0) }}"

- name: Display search results
  ansible.builtin.debug:
    msg: "Found {{ pki_search_count }} results for '{{ pki_search_query }}' ({{ pki_search_cas | length }} CAs, {{ pki_search_certificates | length }} certificates, {{ pki_search_domains | length }} domains)"
  when: not (pki_quiet | default(false))
