---
# Search CAs and certificates

- name: Validate search parameters
  ansible.builtin.assert:
    that:
      - pki_search_query is defined
      - pki_search_query | length > 0
    fail_msg: "pki_search_query is required for search action"
    quiet: true

- name: Search CAs and certificates
  ansible.builtin.uri:
    url: "{{ pki_api_url }}/dashboard/search?query={{ pki_search_query | urlencode }}"
    method: GET
    headers: "{{ _pki_auth_headers }}"
    timeout: "{{ pki_api_timeout }}"
    validate_certs: "{{ pki_validate_certs }}"
  register: pki_search_result

- name: Set search results fact
  ansible.builtin.set_fact:
    pki_search_results: "{{ pki_search_result.json }}"
    pki_search_count: "{{ pki_search_result.json | length }}"

- name: Display search results
  ansible.builtin.debug:
    msg: "Found {{ pki_search_count }} results for '{{ pki_search_query }}'"
  when: not (pki_quiet | default(false))

- name: List search results
  ansible.builtin.debug:
    msg: "[{{ item.type }}] {{ item.title }} - {{ item.subtitle | default('') }}"
  loop: "{{ pki_search_results }}"
  loop_control:
    label: "{{ item.title | default(item.id) }}"
  when: not (pki_quiet | default(false))
