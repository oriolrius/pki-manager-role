---
# List Certificate Authorities

- name: Build CA list query parameters
  ansible.builtin.set_fact:
    _pki_ca_list_params: "{{ {} | combine({'status': pki_ca_status}) if pki_ca_status is defined else {} }}"

- name: List Certificate Authorities
  ansible.builtin.uri:
    url: "{{ pki_api_url }}/cas"
    method: GET
    headers: "{{ _pki_auth_headers }}"
    timeout: "{{ pki_api_timeout }}"
    validate_certs: "{{ pki_validate_certs }}"
  register: pki_ca_list_result

- name: Set CA list fact
  ansible.builtin.set_fact:
    pki_cas: "{{ pki_ca_list_result.json.items | default([]) }}"
    pki_ca_count: "{{ pki_ca_list_result.json.total | default(pki_ca_list_result.json.items | default([]) | length) }}"

- name: Display CA list
  ansible.builtin.debug:
    msg: "Found {{ pki_ca_count }} Certificate Authorities"
  when: not (pki_quiet | default(false))
