---
# OIDC Authentication for PKI Manager API

- name: Check for cached token
  ansible.builtin.stat:
    path: "{{ pki_token_cache_file }}"
  register: _pki_token_cache
  changed_when: false

- name: Read cached token
  when: _pki_token_cache.stat.exists
  block:
    - name: Load cached token data
      ansible.builtin.slurp:
        src: "{{ pki_token_cache_file }}"
      register: _pki_cached_token_raw

    - name: Parse cached token
      ansible.builtin.set_fact:
        _pki_cached_token: "{{ _pki_cached_token_raw.content | b64decode | from_json }}"

    - name: Check if cached token is still valid
      ansible.builtin.set_fact:
        _pki_token_valid: "{{ (_pki_cached_token.expires_at | int) > (ansible_date_time.epoch | int + pki_token_refresh_margin) }}"

    - name: Use cached token if valid
      when: _pki_token_valid
      ansible.builtin.set_fact:
        pki_access_token: "{{ _pki_cached_token.access_token }}"

- name: Obtain new access token
  when: pki_access_token is not defined
  block:
    - name: Request OIDC token
      ansible.builtin.uri:
        url: "{{ pki_oidc_url }}"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ pki_client_id }}"
          client_secret: "{{ pki_client_secret }}"
        headers:
          Content-Type: application/x-www-form-urlencoded
        timeout: "{{ pki_api_timeout }}"
        validate_certs: "{{ pki_validate_certs }}"
      register: _pki_token_response
      no_log: true

    - name: Extract access token
      ansible.builtin.set_fact:
        pki_access_token: "{{ _pki_token_response.json.access_token }}"
        _pki_token_expires_in: "{{ _pki_token_response.json.expires_in | default(300) }}"

    - name: Calculate token expiration time
      ansible.builtin.set_fact:
        _pki_token_expires_at: "{{ ansible_date_time.epoch | int + _pki_token_expires_in | int }}"

    - name: Cache token to file
      ansible.builtin.copy:
        content: |
          {
            "access_token": "{{ pki_access_token }}",
            "expires_at": {{ _pki_token_expires_at }}
          }
        dest: "{{ pki_token_cache_file }}"
        mode: "0600"
      no_log: true

- name: Set authorization header
  ansible.builtin.set_fact:
    _pki_auth_headers:
      Authorization: "Bearer {{ pki_access_token }}"
      Content-Type: application/json
  no_log: true
