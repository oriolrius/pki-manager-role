---
# List certificates

- name: Build certificate list query parameters
  ansible.builtin.set_fact:
    _pki_cert_list_params: {}

- name: Add CA filter if specified
  when: pki_ca_id is defined
  ansible.builtin.set_fact:
    _pki_cert_list_params: "{{ _pki_cert_list_params | combine({'caId': pki_ca_id}) }}"

- name: Add status filter if specified
  when: pki_cert_status is defined
  ansible.builtin.set_fact:
    _pki_cert_list_params: "{{ _pki_cert_list_params | combine({'status': pki_cert_status}) }}"

- name: Add type filter if specified
  when: pki_cert_type is defined
  ansible.builtin.set_fact:
    _pki_cert_list_params: "{{ _pki_cert_list_params | combine({'type': pki_cert_type}) }}"

- name: List certificates
  ansible.builtin.uri:
    url: "{{ pki_api_url }}/certificates"
    method: GET
    headers: "{{ _pki_auth_headers }}"
    timeout: "{{ pki_api_timeout }}"
    validate_certs: "{{ pki_validate_certs }}"
  register: pki_cert_list_result

- name: Set certificate list fact
  ansible.builtin.set_fact:
    pki_certificates: "{{ pki_cert_list_result.json.items | default([]) }}"
    pki_cert_count: "{{ pki_cert_list_result.json.total | default(pki_cert_list_result.json.items | default([]) | length) }}"

- name: Display certificate list
  ansible.builtin.debug:
    msg: "Found {{ pki_cert_count }} certificates"
  when: not (pki_quiet | default(false))
