---
# Revoke a certificate

- name: Validate certificate revocation parameters
  ansible.builtin.assert:
    that:
      - pki_cert_id is defined
      - pki_cert_id | length > 0
    fail_msg: "pki_cert_id is required for cert_revoke action"
    quiet: true

- name: Validate revocation reason if specified
  when: pki_revocation_reason is defined
  ansible.builtin.assert:
    that:
      - pki_revocation_reason in _pki_valid_revocation_reasons
    fail_msg: "pki_revocation_reason must be one of: {{ _pki_valid_revocation_reasons | join(', ') }}"
    quiet: true

- name: Build certificate revocation payload
  ansible.builtin.set_fact:
    _pki_cert_revoke_payload:
      reason: "{{ pki_revocation_reason | default('unspecified') }}"

- name: Revoke certificate
  ansible.builtin.uri:
    url: "{{ pki_api_url }}/certificates/{{ pki_cert_id }}/revoke"
    method: POST
    headers: "{{ _pki_auth_headers }}"
    body_format: json
    body: "{{ _pki_cert_revoke_payload }}"
    status_code: [200, 204]
    timeout: "{{ pki_api_timeout }}"
    validate_certs: "{{ pki_validate_certs }}"
  register: pki_cert_revoke_result

- name: Display revocation result
  ansible.builtin.debug:
    msg: "Certificate {{ pki_cert_id }} has been revoked with reason: {{ pki_revocation_reason | default('unspecified') }}"
  when: not (pki_quiet | default(false))
