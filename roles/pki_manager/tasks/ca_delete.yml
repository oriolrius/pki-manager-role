---
# Delete a Certificate Authority

- name: Validate CA deletion parameters
  ansible.builtin.assert:
    that:
      - pki_ca_id is defined
      - pki_ca_id | length > 0
    fail_msg: "pki_ca_id is required for ca_delete action"
    quiet: true

- name: Prepare delete headers (no Content-Type for DELETE)
  ansible.builtin.set_fact:
    _pki_delete_headers:
      Authorization: "{{ _pki_auth_headers.Authorization }}"

- name: Delete Certificate Authority
  ansible.builtin.uri:
    url: "{{ pki_api_url }}/cas/{{ pki_ca_id }}"
    method: DELETE
    headers: "{{ _pki_delete_headers }}"
    status_code: [200, 204, 404, 409, 500]
    timeout: "{{ pki_api_timeout }}"
    validate_certs: "{{ pki_validate_certs }}"
  register: pki_ca_delete_result

- name: Set deletion status
  ansible.builtin.set_fact:
    pki_ca_deleted: "{{ pki_ca_delete_result.status in [200, 204] }}"
    pki_ca_delete_blocked: "{{ pki_ca_delete_result.status in [409, 500] }}"

- name: Display deletion result
  ansible.builtin.debug:
    msg: "CA {{ pki_ca_id }} has been deleted"
  when:
    - not (pki_quiet | default(false))
    - pki_ca_delete_result.status in [200, 204]

- name: Note if CA was not found
  ansible.builtin.debug:
    msg: "CA {{ pki_ca_id }} was not found (already deleted?)"
  when:
    - not (pki_quiet | default(false))
    - pki_ca_delete_result.status == 404

- name: Note if CA deletion is blocked
  ansible.builtin.debug:
    msg: "CA {{ pki_ca_id }} cannot be deleted yet (must be revoked/expired for > 90 days)"
  when:
    - not (pki_quiet | default(false))
    - pki_ca_delete_result.status == 409

- name: Note if CA deletion failed due to server error
  ansible.builtin.debug:
    msg: "CA {{ pki_ca_id }} could not be deleted due to server error: {{ pki_ca_delete_result.json.error.message | default('Unknown error') }}"
  when:
    - not (pki_quiet | default(false))
    - pki_ca_delete_result.status == 500
