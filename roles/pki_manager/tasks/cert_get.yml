---
# Get certificate details

- name: Validate certificate ID is provided
  ansible.builtin.assert:
    that:
      - pki_cert_id is defined
      - pki_cert_id | length > 0
    fail_msg: "pki_cert_id is required for cert_get action"
    quiet: true

- name: Get certificate details
  ansible.builtin.uri:
    url: "{{ pki_api_url }}/certificates/{{ pki_cert_id }}"
    method: GET
    headers: "{{ _pki_auth_headers }}"
    timeout: "{{ pki_api_timeout }}"
    validate_certs: "{{ pki_validate_certs }}"
  register: pki_cert_get_result

- name: Set certificate details fact
  ansible.builtin.set_fact:
    pki_certificate: "{{ pki_cert_get_result.json }}"

- name: Display certificate details
  ansible.builtin.debug:
    var: pki_certificate
  when: not (pki_quiet | default(false))
