---
# Test authentication

- name: Test authentication by checking API health
  ansible.builtin.uri:
    url: "{{ pki_api_url }}/health"
    method: GET
    headers: "{{ _pki_auth_headers }}"
    timeout: "{{ pki_api_timeout }}"
    validate_certs: "{{ pki_validate_certs }}"
  register: pki_auth_test_result

- name: Display authentication result
  ansible.builtin.debug:
    msg: "Authentication successful. API status: {{ pki_auth_test_result.json.status | default('ok') }}"
