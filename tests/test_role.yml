---
# Test playbook for pki_host_setup role
# Run with: ansible-playbook tests/test_role.yml
#
# Required environment variables (from ~/.config/pki-cli/.env):
#   PKI_API_URL - PKI Manager API URL
#   PKI_OIDC_URL - OIDC token endpoint
#   PKI_CLIENT_ID - OIDC client ID
#   PKI_CLIENT_SECRET - OIDC client secret

- name: Test PKI Host Setup Role
  hosts: localhost
  become: true
  gather_facts: true
  collections:
    - oriolrius.pki_manager

  vars:
    pki_api_url: "{{ lookup('env', 'PKI_API_URL') }}"
    pki_oidc_url: "{{ lookup('env', 'PKI_OIDC_URL') }}"
    pki_client_id: "{{ lookup('env', 'PKI_CLIENT_ID') }}"
    pki_client_secret: "{{ lookup('env', 'PKI_CLIENT_SECRET') }}"

  tasks:
    # First, get list of CAs to find one to use
    - name: List available CAs
      pki_manager:
        action: ca_list
        api_url: "{{ pki_api_url }}"
        oidc_url: "{{ pki_oidc_url }}"
        client_id: "{{ pki_client_id }}"
        client_secret: "{{ pki_client_secret }}"
      register: ca_list

    - name: Show available CAs
      ansible.builtin.debug:
        msg: "Available CAs: {{ ca_list.cas | map(attribute='subject') | list }}"

    - name: Select first active CA
      ansible.builtin.set_fact:
        test_ca_id: "{{ (ca_list.cas | selectattr('status', 'equalto', 'active') | first).id }}"
        test_ca_subject: "{{ (ca_list.cas | selectattr('status', 'equalto', 'active') | first).subject }}"

    - name: Show selected CA
      ansible.builtin.debug:
        msg: "Using CA: {{ test_ca_subject }} ({{ test_ca_id }})"

    # Now run the role
    - name: Include pki_host_setup role
      ansible.builtin.include_role:
        name: pki_host_setup
      vars:
        pki_ca_id: "{{ test_ca_id }}"
        pki_cert_org: "Test Organization"
        pki_cert_country: "ES"
        pki_certificates:
          - name: "test-role-cert"
            cn: "test-role.example.com"
            type: "server"
            dns_names:
              - "test-role.example.com"
              - "{{ ansible_hostname }}.test.local"
            ip_addresses:
              - "{{ ansible_default_ipv4.address | default('127.0.0.1') }}"
            validity: 30

    - name: Show issued certificates info
      ansible.builtin.debug:
        var: pki_issued_certificates

    - name: Verify certificate files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "/etc/ssl/certs/test-role-cert.crt"
        - "/etc/ssl/private/test-role-cert.key"
        - "/etc/ssl/certs/test-role-cert-chain.crt"
        - "/etc/ssl/certs/test-role-cert-fullchain.crt"
      register: cert_files

    - name: Report file status
      ansible.builtin.debug:
        msg: "{{ item.item }}: {{ 'EXISTS' if item.stat.exists else 'MISSING' }}"
      loop: "{{ cert_files.results }}"

    - name: Verify certificate content
      ansible.builtin.command: openssl x509 -in /etc/ssl/certs/test-role-cert.crt -noout -subject -dates
      register: cert_info
      changed_when: false

    - name: Show certificate info
      ansible.builtin.debug:
        var: cert_info.stdout_lines
