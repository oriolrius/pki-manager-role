---
# Example: Renew expiring certificates
#
# This playbook finds certificates expiring within a specified number of days
# and renews them automatically.
#
# Usage:
#   ansible-playbook renew_expiring.yml
#   ansible-playbook renew_expiring.yml -e "expiring_days=60"

- name: Renew expiring certificates
  hosts: localhost
  gather_facts: false
  vars:
    # PKI Manager configuration
    pki_api_url: "{{ lookup('env', 'PKI_API_URL') }}"
    pki_oidc_url: "{{ lookup('env', 'PKI_OIDC_URL') }}"
    pki_client_id: "{{ lookup('env', 'PKI_CLIENT_ID') }}"
    pki_client_secret: "{{ lookup('env', 'PKI_CLIENT_SECRET') }}"

    # Renewal settings
    expiring_days: 30  # Renew certificates expiring within this many days
    new_validity: 365  # New certificate validity in days

  tasks:
    - name: Get expiring certificates
      ansible.builtin.include_role:
        name: pki_manager
      vars:
        pki_action: expiring
        pki_expiring_limit: 100

    - name: Filter certificates needing renewal
      ansible.builtin.set_fact:
        certs_to_renew: "{{ pki_expiring_certs | selectattr('daysRemaining', 'lt', expiring_days | int) | list }}"

    - name: Display certificates to renew
      ansible.builtin.debug:
        msg: "Found {{ certs_to_renew | length }} certificate(s) expiring within {{ expiring_days }} days"

    - name: Show certificates to renew
      ansible.builtin.debug:
        msg: "{{ item.cn }} ({{ item.id }}) - expires in {{ item.daysRemaining }} days"
      loop: "{{ certs_to_renew }}"
      loop_control:
        label: "{{ item.cn | default(item.id) }}"
      when: certs_to_renew | length > 0

    - name: Renew each certificate
      ansible.builtin.include_role:
        name: pki_manager
      vars:
        pki_action: cert_renew
        pki_cert_id: "{{ item.id }}"
        pki_cert_validity: "{{ new_validity }}"
      loop: "{{ certs_to_renew }}"
      loop_control:
        label: "{{ item.cn | default(item.id) }}"
      register: renewal_results
      when: certs_to_renew | length > 0

    - name: Summary
      ansible.builtin.debug:
        msg: |
          Renewal complete!
          Total certificates checked: {{ pki_expiring_certs | length }}
          Certificates renewed: {{ certs_to_renew | length }}
